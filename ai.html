<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mistral 8x7B Chatbot (OpenRouter)</title>
  <style>
    body { font-family: Arial; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f4f4f9; }
    h1 { text-align: center; margin: 20px 0; color: #333; }
    #chat-container { flex: 1; padding: 20px; overflow-y: auto; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; background: #fff; }
    .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 12px; max-width: 70%; word-wrap: break-word; }
    .user { background-color: #0084ff; color: #fff; align-self: flex-end; }
    .bot { background-color: #e5e5ea; color: #000; align-self: flex-start; }
    #input-container { display: flex; padding: 10px 20px; background: #f9f9f9; }
    #user-input { flex: 1; padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
    #send-btn { padding: 10px 20px; margin-left: 10px; font-size: 16px; background: #0084ff; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #send-btn:hover { background: #006bbd; }
  </style>
</head>
<body>

<h1>Mistral 8x7B Chatbot (OpenRouter)</h1>

<div id="chat-container"></div>

<div id="input-container">
  <input type="text" id="user-input" placeholder="Type a message..." />
  <button id="send-btn">Send</button>
</div>

<script>
  const chatContainer = document.getElementById('chat-container');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  // Your OpenRouter API Key
  const OPENROUTER_API_KEY = 'YOUR_OPENROUTER_API_KEY';
  const MODEL = 'mistral-8x7b-instruct'; // Make sure this matches your OpenRouter model exactly

  function appendMessage(text, sender) {
    const msg = document.createElement('div');
    msg.classList.add('message', sender);
    msg.innerText = text;
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  async function getBotResponse(userText) {
    appendMessage(userText, 'user');

    try {
      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: MODEL,
          messages: [
            { role: 'system', content: 'You are a helpful assistant. Reply clearly and concisely.' },
            { role: 'user', content: userText }
          ],
          temperature: 0.7
        })
      });

      const data = await response.json();

      if (!response.ok) {
        // Show actual error message from API
        let errMsg = data.error ? data.error : JSON.stringify(data);
        appendMessage(`Error ${response.status}: ${errMsg}`, 'bot');
        return;
      }

      // Extract bot reply safely
      if (data.choices && data.choices.length > 0 && data.choices[0].message) {
        appendMessage(data.choices[0].message.content, 'bot');
      } else {
        appendMessage('No valid response from model.', 'bot');
      }

    } catch (error) {
      appendMessage('Network/Error: ' + error.message, 'bot');
    }
  }

  sendBtn.addEventListener('click', () => {
    const text = userInput.value.trim();
    if (text) {
      getBotResponse(text);
      userInput.value = '';
    }
  });

  userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendBtn.click();
  });
</script>

</body>
</html>
