<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Daily Mantra Flow</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#09090f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#09090f;--s1:#0f0f1b;--s2:#141424;--s3:#1c1c30;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --violet:#8b5cf6;--pink:#ec4899;--cyan:#06b6d4;
  --amber:#f59e0b;--green:#10b981;--red:#ef4444;--orange:#f97316;
  --accent:#8b5cf6;--accent-2:#06b6d4;
  --text:#f0eeff;--muted:#6b6882;--muted2:#9d9ab5;
  --radius:20px;--rsm:14px;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  color-scheme:dark;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* noise overlay */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.6;}

.wrap{max-width:920px;margin:0 auto;padding:20px 20px 30px;position:relative;z-index:1;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:max(env(safe-area-inset-top),20px) 0 0;}

.clock{display:flex;flex-direction:column;gap:2px;}
.time{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--text);}
.day{color:var(--muted2);font-size:12px;font-weight:600;}
.sim-tag{display:inline-block;margin-top:3px;padding:2px 8px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);border-radius:999px;font-size:10px;font-weight:700;color:#a78bfa;letter-spacing:.04em;}

.day-select-wrap{display:flex;align-items:center;gap:10px;}
.day-select-wrap label{font-size:12px;font-weight:700;color:var(--muted2);letter-spacing:.04em;text-transform:uppercase;}
select{background:var(--s1);color:var(--text);padding:8px 14px;border-radius:12px;border:1px solid var(--border2);font-family:inherit;font-weight:700;font-size:13px;outline:none;cursor:pointer;transition:border-color .2s;}
select:focus{border-color:var(--violet);}

/* GRID LAYOUT */
.main{display:grid;grid-template-columns:1fr 320px;gap:14px;margin-top:18px;}
@media(max-width:860px){.main{grid-template-columns:1fr;} .right-col{order:2;}}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden;position:relative;}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);}

.panel{padding:18px;border-bottom:1px solid var(--border);position:relative;}
.panel:last-child{border-bottom:none;}

.section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--violet);}

/* MANTRA LIST */
.list{display:flex;flex-direction:column;gap:6px;}
.item{padding:10px 12px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s;border:1px solid transparent;}
.item:hover{background:rgba(139,92,246,.06);border-color:rgba(139,92,246,.15);}
.item.active-item{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.25);}
.item .name{font-weight:700;font-size:13px;}
.item .meta{color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;}
.item .done-check{color:var(--green);font-size:12px;margin-left:6px;}

/* ACTIVE PANEL */
.mantra-name{font-weight:800;font-size:24px;background:linear-gradient(135deg,var(--text),var(--muted2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
.mantra-full{color:var(--muted2);font-size:13px;margin-top:8px;line-height:1.6;}

.skip-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--muted2);padding:5px 12px;border-radius:999px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.skip-btn:hover{background:rgba(255,255,255,.08);color:var(--text);}

/* COUNTER */
.big-count{font-family:'JetBrains Mono',monospace;font-size:56px;font-weight:700;line-height:1;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.counter-text{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted2);margin-top:4px;}

/* BUTTONS */
button{font-family:inherit;cursor:pointer;transition:all .17s;}
button:active{transform:scale(.94);}

.btn-primary{background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;border:none;border-radius:14px;padding:13px 28px;font-size:14px;font-weight:700;box-shadow:0 4px 20px rgba(124,58,237,.35);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,58,237,.5);}

.btn-counter{background:var(--s2);border:1px solid var(--border2);color:var(--text);border-radius:14px;padding:12px 28px;font-size:20px;font-weight:800;}
.btn-counter:hover{background:var(--s3);border-color:rgba(139,92,246,.4);}

.btn-next{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;border:none;border-radius:14px;padding:12px 28px;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(124,58,237,.3);}

.btn-choice{background:var(--s2);border:1px solid rgba(139,92,246,.3);border-radius:12px;padding:12px 24px;font-size:15px;font-weight:800;color:#a78bfa;}
.btn-choice:hover{background:rgba(139,92,246,.15);}

.controls{display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap;}
.next-wrap{display:flex;justify-content:center;margin-top:14px;}

/* PROGRESS */
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.progress-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted2);}
.progress{height:6px;background:rgba(255,255,255,.04);border-radius:999px;overflow:hidden;}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--violet));border-radius:999px;transition:width .3s ease;}

/* SIDEBAR */
.sidebar-title{padding:16px 18px 0;font-size:15px;font-weight:800;}
.sidebar-sub{padding:4px 18px 12px;font-size:11px;color:var(--muted);}

/* activity area sub-styles */
.act-sub{font-size:13px;color:var(--muted2);line-height:1.6;}
.act-head{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.prefix-note{padding:10px 14px;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:12px;font-size:12px;color:#a78bfa;line-height:1.5;}

/* done state */
.all-done-msg{text-align:center;padding:20px 0;}
.done-emoji{font-size:48px;margin-bottom:12px;}
.done-title{font-size:20px;font-weight:800;margin-bottom:6px;}
.done-sub{font-size:13px;color:var(--muted2);margin-bottom:18px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="clock">
      <div class="time" id="time">--:--:--</div>
      <div class="day" id="day">Loading...</div>
      <div id="simTag" class="sim-tag" style="display:none"></div>
    </div>
    <div class="day-select-wrap">
      <label for="daySelect">Simulate</label>
      <select id="daySelect">
        <option value="sun">Sunday</option>
        <option value="mon">Monday</option>
        <option value="tue">Tuesday</option>
        <option value="wed">Wednesday</option>
        <option value="thu">Thursday</option>
        <option value="fri">Friday</option>
        <option value="sat">Saturday</option>
      </select>
    </div>
  </header>

  <div class="main">
    <div>
      <div class="card player">
        <div class="panel" style="display:none;">
          <div class="section-title">Today's Flow</div>
          <div class="list" id="todayList"></div>
        </div>

        <div class="panel" aria-live="polite" id="activePanel">
          <button class="skip-btn" id="skipBtn" style="display:none">Skip ›</button>
          <div class="mantra-name" id="activeName">Ready to begin?</div>
          <div class="mantra-full" id="activeFull">Review the list above, then press Start.</div>
          <div id="activityArea" style="margin-top:14px"></div>
          <div class="next-wrap">
            <button id="startFlow" class="btn-primary">▶ Start Flow</button>
          </div>
        </div>

        <div class="panel">
          <div class="progress-row">
            <div class="progress-label">Progress</div>
            <div class="progress-count" id="progressText">0 / 0</div>
          </div>
          <div class="progress"><i id="bar" style="width:0%"></i></div>
        </div>
      </div>
    </div>

    <div class="right-col">
      <div class="card">
        <div class="sidebar-title">Today's Mantras</div>
        <div class="sidebar-sub" id="sidebarDayLabel">Daily list</div>
        <div style="padding:0 12px 16px;">
          <div class="list" id="listSidebar"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const MANTRAS = [
  {id:'sai',   name:'Sai Baba',            type:'activity', full:'Om Shri Sai Nathaya Namah'},
  {id:'gayatri',name:'Gayatri',            type:'chant',    full:'Om Bhur Bhuva Swaha.. Tat Savitur Varenyam.. Bhargo Devasya Dheemahi.. Dhiyo Yo Nah Prachodayat..', count:{default:3,sat:11}},
  {id:'shiv',  name:'Shiva',               type:'chant',    full:'Om Namah Shivaya',                                count:{default:11,mon:108}},
  {id:'shani', name:'Saturn / Shani',      type:'chant',    full:'Om Sham Shanicharaya Namah',                     count:{default:11,sat:21}},
  {id:'budha', name:'Mercury / Budha',     type:'chant',    full:'Om Braam Brim Broum Sah Budhaya Namah',          count:{default:11}},
  {id:'chandra',name:'Moon / Chandra',     type:'chant',    full:'Om Chandraya Namah',                             count:{default:21}, days:['mon']},
  {id:'gan',   name:'Ganesh',              type:'chant',    full:'Om Gan Ganapataye Namah',                        count:{default:21}, days:['tue']},
  {id:'rahu',  name:'Rahu',                type:'chant',    full:'Om Rahave Namah',                                count:{default:11}, days:['wed','sat']},
  {id:'brihaspati',name:'Jupiter / Brihaspati',type:'chant',full:'Om Brim Brihaspataye Namah',                    count:{default:21}, days:['thu']},
  {id:'gita',  name:'Bhagavad Gita',       type:'activity', full:'Read Bhagavad Gita shloka + meaning', fetch:true},
  {id:'hare',  name:'Hare Krishna',        type:'chant',    full:'Hare Kṛṣṇa, Hare Kṛṣṇa, Kṛṣṇa Kṛṣṇa, Hare Hare.. Hare Rāma, Hare Rāma, Rāma Rāma, Hare Hare', count:{default:216}, isHare:true}
];

let GITA_SHLOKA = null;
async function loadGita(){
  try{
    const res = await fetch('https://api.sampleapis.com/quotes/quotes');
    const data = await res.json();
    GITA_SHLOKA = data[0];
  } catch(e){
    GITA_SHLOKA = {shloka:'कर्मण्येवाधिकारस्ते', trans:'Karmanye vadhikaraste ma phaleshu kadachana', meaning:'You have a right to perform your duty, not to the fruits.'};
  }
}
loadGita();

const TZ = 'Asia/Kathmandu';
function nowKTM(){ return new Date(new Date().toLocaleString('en-US',{timeZone:TZ})); }
function weekdayKey(d){ return ['sun','mon','tue','wed','thu','fri','sat'][d.getDay()]; }
const DAY_NAMES = {sun:'Sunday',mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday'};

// ── ELEMENTS ──
const timeEl       = document.getElementById('time');
const dayEl        = document.getElementById('day');
const simTag       = document.getElementById('simTag');
const todayList    = document.getElementById('todayList');
const listSidebar  = document.getElementById('listSidebar');
const sidebarDayLabel = document.getElementById('sidebarDayLabel');
const activeName   = document.getElementById('activeName');
const activeFull   = document.getElementById('activeFull');
const activityArea = document.getElementById('activityArea');
const startFlow    = document.getElementById('startFlow');
const progressText = document.getElementById('progressText');
const bar          = document.getElementById('bar');
const skipBtn      = document.getElementById('skipBtn');
const daySelect    = document.getElementById('daySelect');

// ── STATE ──
let todays = [], idx = 0, sessionStarted = false;
let currentDayKey = weekdayKey(nowKTM()); // BUG2 FIX: track selected day key
let session = {currentMantra:null, count:0, goal:0};

// ── CLOCK ──
function refreshClock(){
  const d = nowKTM();
  timeEl.textContent = d.toLocaleTimeString('en-US',{hour12:false,timeZone:TZ});
  dayEl.textContent  = d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short',year:'numeric',timeZone:TZ});
}
setInterval(refreshClock, 1000);
refreshClock();

// ── BUG1 FIX: set dropdown to today on load ──
daySelect.value = weekdayKey(nowKTM());

// ── BUILD DAY ──
function buildTodays(key){
  currentDayKey = key; // BUG2 FIX: update tracked key
  todays = MANTRAS.filter(m => !m.days || m.days.includes(key) || m.days.includes('daily'));
  renderTodayList();
  renderSidebar();
  updateSidebarDayLabel();

  // BUG4 FIX: show/hide sim tag
  const realKey = weekdayKey(nowKTM());
  if(key !== realKey){
    simTag.style.display = 'inline-block';
    simTag.textContent   = 'Simulating ' + DAY_NAMES[key];
  } else {
    simTag.style.display = 'none';
  }
}

function updateSidebarDayLabel(){
  const realKey = weekdayKey(nowKTM());
  sidebarDayLabel.textContent = currentDayKey === realKey
    ? 'Daily mantra schedule'
    : 'Schedule for ' + DAY_NAMES[currentDayKey];
}

function effectiveCount(m, key){
  if(!m.count) return null;
  if(typeof m.count === 'number') return m.count;
  if(typeof m.count === 'object'){
    if(key && m.count[key] !== undefined) return m.count[key];
    return m.count.default || null;
  }
  return null;
}

// ── RENDER FLOW LIST (left panel) ──
function renderTodayList(){
  todayList.innerHTML = '';
  todays.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'item' + (sessionStarted && i === idx ? ' active-item' : '');
    const cnt = effectiveCount(m, currentDayKey); // BUG2 FIX: use currentDayKey
    const metaStr = m.type === 'chant' ? cnt + ' times' : 'Activity';
    div.innerHTML = `<div class="name">${m.name}</div><div class="meta">${metaStr}</div>`;
    div.onclick = () => { if(sessionStarted){ idx = i; showActive(); } };
    todayList.appendChild(div);
  });
}

// ── RENDER SIDEBAR ──
function renderSidebar(){
  listSidebar.innerHTML = '';
  todays.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'item';
    const cnt = effectiveCount(m, currentDayKey); // BUG2 FIX: use currentDayKey
    const metaStr = m.type === 'chant' ? cnt + ' × ' + m.full.split(' ').slice(0,3).join(' ') + '…' : 'Activity';
    div.innerHTML = `<div class="name">${m.name}</div><div class="meta" id="meta-${m.id}">${metaStr}</div>`;
    div.onclick = () => { if(sessionStarted){ idx = i; showActive(); } };
    listSidebar.appendChild(div);
  });
}

// ── SHOW ACTIVE MANTRA ──
function showActive(){
  const m = todays[idx];
  if(!m) return;

  activeName.textContent = m.name;
  activeFull.textContent = m.full || '';
  activityArea.innerHTML = '';
  session.count = 0;
  session.goal  = 0;

  skipBtn.style.display = 'block';
  skipBtn.onclick = () => { advance(); };

  if(m.type === 'activity'){
    if(m.fetch && GITA_SHLOKA){
      activityArea.innerHTML = `
        <div class="act-head">${GITA_SHLOKA.shloka}</div>
        <div class="act-sub" style="margin-top:6px">${GITA_SHLOKA.trans}</div>
        <div class="act-sub" style="margin-top:8px;color:var(--muted2)">${GITA_SHLOKA.meaning}</div>`;
    }
    advanceButton();
    updateSidebarStatus(m.id, 0, 0);
  }
  else if(m.type === 'chant'){
    // BUG2 FIX: use currentDayKey, NOT weekdayKey(nowKTM())
    const cnt = effectiveCount(m, currentDayKey);
    session.currentMantra = m;
    session.count = 0;
    session.goal  = cnt;

    if(m.isHare){
      const choiceDiv = document.createElement('div');
      choiceDiv.style.cssText = 'display:flex;gap:10px;';
      [108, 216].forEach(n => {
        const btn = document.createElement('button');
        btn.textContent = n;
        btn.className = 'btn-choice';
        btn.onclick = () => {
          session.goal = n;
          choiceDiv.remove();
          const pre = document.createElement('div');
          pre.className = 'prefix-note';
          pre.style.marginBottom = '12px';
          pre.textContent = 'Prefix: Jai Shree Krishna, Chaitanya Prabhu Nityananda…';
          activityArea.insertBefore(pre, activityArea.firstChild);
          showHareCounter(m);
        };
        choiceDiv.appendChild(btn);
      });
      activityArea.appendChild(choiceDiv);
    } else {
      showCounter(m);
    }
  }
  highlightSidebar();
  updateCounterUI();
  updateProgress();
}

function updateSidebarStatus(id, count, goal){
  const meta = document.getElementById('meta-' + id);
  if(!meta) return;
  if(goal > 0 && count >= goal){
    meta.innerHTML = '<span style="color:var(--green);font-weight:700">✓ Done</span>';
  } else if(goal > 0){
    meta.textContent = count + ' / ' + goal;
  }
}

function showCounter(m){
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;';
  const big  = document.createElement('div'); big.className = 'big-count'; big.id = 'bigCount'; big.textContent = '0';
  const sub  = document.createElement('div'); sub.className = 'counter-text'; sub.id = 'counterText'; sub.textContent = `0 / ${session.goal}`;
  const btn  = document.createElement('button'); btn.className = 'btn-counter'; btn.textContent = '+1';
  btn.onclick = () => {
    session.count++;
    if(session.count >= session.goal){
      session.count = session.goal;
      btn.textContent = 'Next ›';
      btn.className = 'btn-next';
      btn.onclick = advance;
    }
    updateCounterUI();
    updateProgress();
    updateSidebarStatus(m.id, session.count, session.goal);
  };
  wrap.append(big, sub, btn);
  activityArea.appendChild(wrap);
}

function showHareCounter(m){
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;';
  const big  = document.createElement('div'); big.className = 'big-count'; big.id = 'bigCount'; big.textContent = '0';
  const sub  = document.createElement('div'); sub.className = 'counter-text'; sub.id = 'counterText'; sub.textContent = `0 / ${session.goal}`;
  const btn  = document.createElement('button'); btn.className = 'btn-counter'; btn.textContent = '+1';
  btn.onclick = () => {
    session.count++;
    if(session.count >= session.goal){
      session.count = session.goal;
      btn.textContent = 'Next ›';
      btn.className = 'btn-next';
      btn.onclick = () => {
        const suf = document.createElement('div');
        suf.className = 'prefix-note';
        suf.style.marginTop = '8px';
        suf.textContent = 'Suffix: Jai Shree Krishna, Chaitanya Prabhu Nityananda (End)';
        wrap.appendChild(suf);
        btn.textContent = 'Next ›';
        btn.onclick = advance;
      };
    }
    updateCounterUI();
    updateProgress();
    updateSidebarStatus(m.id, session.count, session.goal);
  };
  wrap.append(big, sub, btn);
  activityArea.appendChild(wrap);
}

function updateCounterUI(){
  const bc = document.getElementById('bigCount');
  const ct = document.getElementById('counterText');
  if(bc) bc.textContent = session.count;
  if(ct) ct.textContent = `${session.count} / ${session.goal}`;
}

function updateProgress(){
  const total = todays.length;
  const pct   = session.goal ? Math.min(100, Math.round((session.count / session.goal) * 100)) : 0;
  bar.style.width   = pct + '%';
  progressText.textContent = `${session.count} / ${session.goal}`;
}

function advance(){
  idx++;
  if(idx >= todays.length){
    activeName.textContent = '';
    activeFull.textContent = '';
    skipBtn.style.display = 'none';
    activityArea.innerHTML = `
      <div class="all-done-msg">
        <div class="done-emoji">🙏</div>
        <div class="done-title">All done for today</div>
        <div class="done-sub">Well done. Your practice is complete.</div>
        <button class="btn-primary" onclick="location.reload()">Start over</button>
      </div>`;
    progressText.textContent = 'Done';
    bar.style.width = '100%';
    return;
  }
  showActive();
}

function highlightSidebar(){
  Array.from(todayList.children).forEach((el, i) => {
    el.classList.toggle('active-item', i === idx);
  });
}

function advanceButton(){
  const btn = document.createElement('button');
  btn.className = 'btn-next';
  btn.style.marginTop = '12px';
  btn.textContent = 'Next ›';
  btn.onclick = advance;
  activityArea.appendChild(btn);
}

// ── START BUTTON ──
startFlow.onclick = () => {
  sessionStarted = true;
  startFlow.style.display = 'none';
  idx = 0;
  showActive();
  renderTodayList(); // re-render to show active highlight
};

// ── DAY SELECT — BUG3+4 FIX ──
daySelect.addEventListener('change', e => {
  buildTodays(e.target.value);
  // Reset session state cleanly
  idx = 0;
  sessionStarted = false;
  session = {currentMantra:null, count:0, goal:0};
  // Reset active panel to initial state
  activeName.textContent = 'Ready to begin?';
  activeFull.textContent = 'Review the list above, then press Start.';
  activityArea.innerHTML = '';
  skipBtn.style.display = 'none';
  startFlow.style.display = 'block'; // BUG4 FIX: restore start button
  progressText.textContent = '0 / 0';
  bar.style.width = '0%';
});

// ── INIT ──
buildTodays(currentDayKey);
</script>
