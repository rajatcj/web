<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Disco Sync</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
:root {
  --glass: rgba(0,0,0,.55);
}

html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: system-ui;
}

#stage {
  position: fixed;
  inset: 0;
  transition: background 80ms linear;
}

.glow { box-shadow: inset 0 0 100px rgba(255,255,255,.5); }
.blur { filter: blur(6px) saturate(180%); }

/* ---------- UI ---------- */
#menuBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--glass);
  color: white;
  border-radius: 50%;
  width: 54px;
  height: 54px;
  border: none;
  font-size: 22px;
  z-index: 10;
}

#panel {
  position: fixed;
  right: 0;
  top: 0;
  height: 100%;
  width: 260px;
  background: var(--glass);
  backdrop-filter: blur(10px);
  color: white;
  padding: 16px;
  transform: translateX(100%);
  transition: .3s;
  z-index: 9;
}

#panel.open {
  transform: translateX(0);
}

button, select, input {
  width: 100%;
  margin: 6px 0;
  padding: 8px;
  border-radius: 8px;
  border: none;
}

label {
  font-size: 14px;
  display: block;
  margin-top: 6px;
}

#qr { margin-top: 10px; }
#status { font-size: 12px; opacity: .8; }
</style>
</head>

<body>

<div id="stage"></div>

<button id="menuBtn" onclick="togglePanel()">☰</button>

<div id="panel">
  <h3>Disco Sync</h3>

  <button onclick="createRoom()">🎧 Create Room (DJ)</button>
  <input id="roomInput" placeholder="Room ID">
  <button onclick="joinRoom()">👥 Join Room</button>

  <select id="audioSource">
    <option value="mic">🎤 Microphone</option>
    <option value="device">🔊 Device / Tab Audio</option>
  </select>

  <select id="mode" onchange="currentMode=this.value">
    <option value="beat">Beat Pulse</option>
    <option value="rainbow">Rainbow</option>
    <option value="strobe">Strobe</option>
    <option value="wave">Wave</option>
    <option value="bass">Bass</option>
  </select>

  <label><input type="checkbox" id="glow"> Glow</label>
  <label><input type="checkbox" id="blur"> Blur</label>
  <label><input type="checkbox" id="vibe"> Vibration</label>

  <button onclick="toggleFullscreen()">⛶ Fullscreen</button>

  <div id="status"></div>
  <div id="qr"></div>
</div>

<script>
/* ---------- CORE ---------- */
let peer, connections=[], conn;
let analyser, data;
let lastEnergy = 0;
let hue = 0;
let currentMode = "beat";
const stage = document.getElementById("stage");

/* ---------- ROOM ---------- */
function genRoom() {
  return "dj-" + Math.random().toString(36).slice(2,7);
}

function createRoom() {
  const id = genRoom();
  peer = new Peer(id);
  status("Room: " + id);

  peer.on("open", () => showQR(id));
  peer.on("connection", c => connections.push(c));

  initAudio();
}

function joinRoom() {
  peer = new Peer();
  peer.on("open", () => {
    conn = peer.connect(roomInput.value.trim());
    status("Connected");
    conn.on("data", applyState);
  });
}

/* ---------- AUDIO ---------- */
async function initAudio() {
  let stream;

  if (audioSource.value === "device") {
    stream = await navigator.mediaDevices.getDisplayMedia({
      audio: true,
      video: false
    });
  } else {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  }

  const ctx = new AudioContext();
  ctx.resume();

  analyser = ctx.createAnalyser();
  analyser.fftSize = 256;
  data = new Uint8Array(analyser.frequencyBinCount);

  ctx.createMediaStreamSource(stream).connect(analyser);
  loop();
}

/* ---------- VISUAL ENGINE ---------- */
function loop() {
  requestAnimationFrame(loop);
  analyser.getByteFrequencyData(data);

  const energy = data.reduce((a,b)=>a+b)/data.length;
  const beat = energy > lastEnergy * 1.4;
  lastEnergy = energy * 0.8 + lastEnergy * 0.2;

  hue = (hue + 1 + energy*0.02) % 360;

  let color;
  switch (currentMode) {
    case "rainbow": color = `hsl(${hue},100%,50%)`; break;
    case "strobe": color = beat ? "#fff" : "#000"; break;
    case "wave": color = `hsl(${hue},100%,${40+Math.sin(Date.now()/200)*20}%)`; break;
    case "bass": color = `hsl(${energy*3},100%,50%)`; break;
    default: color = beat ? `hsl(${hue},100%,60%)` : `hsl(${hue},100%,30%)`;
  }

  const state = { color, beat, mode: currentMode };
  applyVisual(state);
  connections.forEach(c => c.send(state));
}

function applyVisual(s) {
  stage.style.background = s.color;
  stage.classList.toggle("glow", glow.checked && s.beat);
  stage.classList.toggle("blur", blur.checked && s.beat);

  if (s.beat && vibe.checked && navigator.vibrate) navigator.vibrate(30);
}

function applyState(s) {
  currentMode = s.mode;
  applyVisual(s);
}

/* ---------- UI ---------- */
function togglePanel() {
  panel.classList.toggle("open");
}

function toggleFullscreen() {
  document.fullscreenElement
    ? document.exitFullscreen()
    : document.documentElement.requestFullscreen();
}

function status(t) {
  document.getElementById("status").innerText = t;
}

function showQR(id) {
  qr.innerHTML = "";
  new QRCode(qr, {
    text: location.href.split("?")[0] + "?room=" + id,
    width: 120,
    height: 120
  });
}

/* ---------- AUTO JOIN ---------- */
const q = new URLSearchParams(location.search);
if (q.get("room")) roomInput.value = q.get("room");
</script>

</body>
</html>
